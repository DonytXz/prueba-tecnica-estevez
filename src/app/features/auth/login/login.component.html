<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario</mat-label>
          <input matInput formControlName="username" placeholder="e.g., emilys" autocomplete="off">
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">El usuario es obligatorio.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password" placeholder="e.g., 123456">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">La contraseña es obligatoria.</mat-error>
        </mat-form-field>

        @if (errorMessage) {
          <p class="error-message">{{ errorMessage }}</p>
        }

        <button mat-raised-button color="primary" type="submit"
                [disabled]="!loginForm.valid || isLoading()" class="full-width">
          {{ isLoading() ? 'Autenticando...' : 'Iniciar Sesión' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
